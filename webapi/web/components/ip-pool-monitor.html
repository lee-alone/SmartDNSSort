<!-- IP Pool Monitor Component -->
<div class="col-span-1 md:col-span-2 xl:col-span-4 bg-card-light dark:bg-card-dark rounded-xl border border-[#e9e8ce] dark:border-[#3a3922] shadow-sm flex flex-col overflow-hidden">
    <div class="p-4 border-b border-[#e9e8ce] dark:border-[#3a3922] flex justify-between items-center">
        <h2 class="font-bold text-lg" data-i18n="dashboard.ipPoolMonitor">IP Pool Monitor</h2>
        <button id="refreshIpPoolBtn" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" title="Refresh">
            <span class="material-symbols-outlined text-sm">refresh</span>
        </button>
    </div>
    
    <!-- IP Monitor Stats -->
    <div class="p-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 border-b border-[#e9e8ce] dark:border-[#3a3922]">
        <div>
            <p class="text-xs text-text-sub-light dark:text-text-sub-dark" data-i18n="dashboard.totalIPs">Total IPs</p>
            <h3 id="ip_pool_total_ips" class="text-xl font-bold">0</h3>
        </div>
        <div>
            <p class="text-xs text-text-sub-light dark:text-text-sub-dark" data-i18n="dashboard.totalRefreshes">Total Refreshes</p>
            <h3 id="ip_pool_total_refreshes" class="text-xl font-bold">0</h3>
        </div>
        <div>
            <p class="text-xs text-text-sub-light dark:text-text-sub-dark" data-i18n="dashboard.totalIpsRefreshed">Total IPs Refreshed</p>
            <h3 id="ip_pool_total_ips_refreshed" class="text-xl font-bold">0</h3>
        </div>
        <div>
            <p class="text-xs text-text-sub-light dark:text-text-sub-dark" data-i18n="dashboard.t0PoolSize">T0 Pool</p>
            <h3 id="ip_pool_t0_size" class="text-xl font-bold">0</h3>
        </div>
        <div>
            <p class="text-xs text-text-sub-light dark:text-text-sub-dark" data-i18n="dashboard.t1PoolSize">T1 Pool</p>
            <h3 id="ip_pool_t1_size" class="text-xl font-bold">0</h3>
        </div>
        <div>
            <p class="text-xs text-text-sub-light dark:text-text-sub-dark" data-i18n="dashboard.t2PoolSize">T2 Pool</p>
            <h3 id="ip_pool_t2_size" class="text-xl font-bold">0</h3>
        </div>
    </div>

    <!-- Top IP List Table -->
    <div class="overflow-x-auto">
        <table id="ip_pool_table" class="w-full text-sm text-left">
            <thead class="text-xs text-text-sub-light dark:text-text-sub-dark uppercase bg-[#f4f4e6] dark:bg-[#23220f]">
                <tr>
                    <th class="px-6 py-3" data-i18n="dashboard.ip">IP</th>
                    <th class="px-6 py-3" data-i18n="dashboard.repDomain">Rep Domain</th>
                    <th class="px-6 py-3" data-i18n="dashboard.refCount">Ref Count</th>
                    <th class="px-6 py-3" data-i18n="dashboard.accessHeat">Access Heat</th>
                    <th class="px-6 py-3" data-i18n="dashboard.rtt">RTT (ms)</th>
                    <th class="px-6 py-3" data-i18n="dashboard.lastAccess">Last Access</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-[#e9e8ce] dark:divide-[#3a3922]" id="ip_pool_table_body">
                <tr>
                    <td colspan="6" class="px-6 py-4 text-center text-text-sub-light dark:text-text-sub-dark">
                        <span class="material-symbols-outlined inline-block align-middle mr-2">info</span>
                        <span data-i18n="dashboard.noIpData">No IP pool data available</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
